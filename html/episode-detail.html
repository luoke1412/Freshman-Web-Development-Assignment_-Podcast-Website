<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>听见成长 | 节目详情</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/episodes.css">
  </head>
  <body>
    <!-- 节目详情页适合展示左右分栏布局 -->
    <header class="top">
      <div class="w nav">
        <a class="logo" href="./index.html">听见成长</a>
        <nav class="menu">
          <a href="./index.html">首页</a>
          <a href="./about.html">关于我</a>
          <a href="./episodes.html">节目</a>
          <a href="./resources.html">资源</a>
          <a href="./contact.html">联系我</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <!-- 详情页用两列结构，左边封面，右边文字内容 -->
      <div class="w two-col detail-main">
        <!-- 左边先预留封面位置，后面换图会很方便 -->
        <article class="box detail-left">
          <div class="big-pic">这里放节目封面</div>
        </article>
        <!-- 右边放标题、介绍、音频和要点列表 -->
        <article class="box detail-right">
          <p class="small-title">节目详情</p>
          <h1>第 01 期：把学习计划写得更清楚</h1>
          <p>发布时间：2026-06-02</p>
          <p>本期内容主要聊怎样把模糊目标拆成可执行的小任务，让做计划这件事真正落到每天的安排里。</p>
          <div class="audio-box">这里放音频播放器</div>

          <!-- 下面这个列表方便展示本期节目的重点内容 -->
          <h2>本期内容要点</h2>
          <ul class="list">
            <li>先确定一周最重要的两三件事</li>
            <li>把任务拆短，写得具体一点</li>
            <li>每天留一点机动时间</li>
            <li>做完之后简单复盘</li>
          </ul>
        </article>
      </div>
    </main>

    <footer class="foot">
      <div class="w foot-in">
        <p>听见成长 | 节目详情</p>
      </div>
    </footer>
  </body>
</html>
